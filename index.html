<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNFIRES Webサイト管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--orange:#FF5500;--orange-light:#FF7733;--dark:#1A0D00;--mid:#221200;--light:#2E1A05;--border:#5A2E00;--white:#FFF5F0;--gray:#B09080;--green:#22C55E;--red:#EF4444}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--dark);color:var(--white);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:110px}header{background:var(--mid);border-bottom:2px solid var(--orange);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--orange);letter-spacing:.05em}.container{max-width:1200px;margin:2rem auto;padding:0 1rem;display:grid;gap:2rem}.panel{background:var(--mid);border:1px solid var(--border);padding:1.5rem;border-radius:4px}.panel-title{font-size:1.1rem;font-weight:700;color:var(--orange);margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:.5rem;display:flex;justify-content:space-between;align-items:center}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1rem}.form-group{display:flex;flex-direction:column;gap:.3rem}label{font-size:.8rem;color:var(--gray);font-weight:700}input,select{background:var(--light);border:1px solid var(--border);color:var(--white);padding:.6rem;border-radius:3px;font:inherit;font-size:.9rem}input:focus,select:focus{outline:none;border-color:var(--orange)}.btn{background:var(--orange);color:#fff;border:none;padding:.65rem 1.2rem;font-weight:700;border-radius:3px;cursor:pointer}.btn:hover{background:var(--orange-light)}.btn-green{background:var(--green)}.btn-red{background:var(--red);padding:.3rem .6rem;font-size:.75rem}.preview-box{margin-top:1.2rem;background:rgba(0,0,0,.2);border:1px dashed var(--border);padding:.75rem;max-height:300px;overflow:auto;min-height:38px}.preview-item{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.55rem 0;border-bottom:1px solid rgba(90,46,0,.35);font-size:.9rem}.preview-item:last-child{border-bottom:none}.empty{color:var(--gray);font-size:.85rem}.main-actions{position:fixed;bottom:0;left:0;right:0;background:rgba(26,13,0,.97);border-top:2px solid var(--orange);padding:1rem 2rem;display:flex;justify-content:center;z-index:1000}.export{width:min(900px,100%);font-size:1rem}.notice{color:var(--gray);font-size:.78rem;margin-top:.6rem}@media(max-width:700px){header{padding:1rem}.logo{font-size:1.6rem}.main-actions{padding:.8rem}.container{margin:1rem auto}.panel{padding:1rem}}
</style>
</head>
<body>
<header><div class="logo">SUNFIRES ADMIN</div><div style="font-size:.8rem;color:var(--gray)">データはブラウザに自動保存されます</div></header>
<div class="container">
<section class="panel"><div class="panel-title"><span>1. カウンター数値指定</span><button class="btn btn-green" onclick="autoCalcHero()" style="font-size:.75rem;padding:.35rem .65rem">自動計算する</button></div><div class="form-grid"><div class="form-group"><label>総試合数</label><input type="number" id="hero-played" value="2"></div><div class="form-group"><label>総勝利数</label><input type="number" id="hero-wins" value="2"></div><div class="form-group"><label>総得点数</label><input type="number" id="hero-goals" value="38"></div><div class="form-group"><label>現在順位</label><input type="text" id="hero-rank" value="3位"></div></div></section>
<section class="panel"><div class="panel-title">2. 試合結果・動画の追加</div><div class="form-grid"><div class="form-group"><label>試合日</label><input id="match-date" placeholder="2026.06.07"></div><div class="form-group"><label>節 / 大会名</label><input id="match-round" placeholder="第2節"></div><div class="form-group"><label>対戦相手</label><input id="match-opp" placeholder="ナイスガイ"></div><div class="form-group"><label>結果</label><select id="match-result"><option value="W">○ 勝利</option><option value="D">△ 引分</option><option value="L">● 敗北</option></select></div></div><div class="form-grid"><div class="form-group"><label>自得点</label><input type="number" id="match-shome" value="0"></div><div class="form-group"><label>相手得点</label><input type="number" id="match-saway" value="0"></div><div class="form-group"><label>YouTube【前半】URL</label><input id="match-yt1" placeholder="https://youtu.be/..."></div><div class="form-group"><label>YouTube【後半】URL</label><input id="match-yt2" placeholder="https://youtu.be/..."></div></div><button class="btn" onclick="addMatch()">試合データを追加</button><div class="preview-box" id="match-list"></div></section>
<section class="panel"><div class="panel-title">3. リーグ順位表チームの追加</div><div class="form-grid"><div class="form-group"><label>順位</label><input type="number" id="std-rank" value="1"></div><div class="form-group"><label>チーム名</label><input id="std-name" placeholder="SUNFIRES ★"></div><div class="form-group"><label>試合数</label><input type="number" id="std-p" value="0"></div><div class="form-group"><label>勝</label><input type="number" id="std-w" value="0"></div><div class="form-group"><label>分</label><input type="number" id="std-d" value="0"></div><div class="form-group"><label>負</label><input type="number" id="std-l" value="0"></div></div><div class="form-grid"><div class="form-group"><label>得点</label><input type="number" id="std-gf" value="0"></div><div class="form-group"><label>失点</label><input type="number" id="std-ga" value="0"></div><div class="form-group"><label>勝点</label><input type="number" id="std-pts" value="0"></div><div class="form-group"><label>直近10試合（例: WWDL）</label><input id="std-form" placeholder="WW"></div></div><button class="btn" onclick="addStanding()">順位表チームを追加</button><div class="preview-box" id="standing-list"></div></section>
<section class="panel"><div class="panel-title">4. 選手スタッツの追加・更新</div><div class="form-grid"><div class="form-group"><label>選手名</label><input id="player-name" placeholder="田中 健一"></div><div class="form-group"><label>得点</label><input type="number" id="player-goals" value="0"></div><div class="form-group"><label>アシスト</label><input type="number" id="player-assists" value="0"></div></div><button class="btn" onclick="addPlayer()">選手を追加・更新</button><div class="preview-box" id="player-list"></div><p class="notice">同じ名前を入力すると、その選手の数字を更新します。</p></section>
</div>
<div class="main-actions"><button class="btn export" onclick="exportHTML()">🔥 公開用 index.html を書き出す</button></div>
<script>
const STORAGE_KEY='sunfires_admin_store_v2';
let store={hero:{played:2,wins:2,goals:38,rank:'3位'},matches:[],standings:[],players:[]};
try{const saved=localStorage.getItem(STORAGE_KEY);if(saved)store=JSON.parse(saved)}catch(e){console.warn('保存データの読込に失敗',e)}
const $=id=>document.getElementById(id);const num=id=>Number($(id).value)||0;const text=id=>$(id).value.trim();
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(store))}
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function updatePreview(){save();$('hero-played').value=store.hero.played;$('hero-wins').value=store.hero.wins;$('hero-goals').value=store.hero.goals;$('hero-rank').value=store.hero.rank;
$('match-list').innerHTML=store.matches.length?store.matches.map((m,i)=>`<div class="preview-item"><span>${esc(m.date)}［${esc(m.round)}］SUNFIRES ${m.shome}-${m.saway} ${esc(m.opp)} (${esc(m.result)})</span><button class="btn btn-red" onclick="removeItem('matches',${i})">削除</button></div>`).join(''):'<div class="empty">試合データはまだありません</div>';
$('standing-list').innerHTML=store.standings.length?[...store.standings].sort((a,b)=>a.rank-b.rank).map(s=>{const i=store.standings.indexOf(s);return `<div class="preview-item"><span>#${s.rank} ${esc(s.name)}（勝点 ${s.pts}）</span><button class="btn btn-red" onclick="removeItem('standings',${i})">削除</button></div>`}).join(''):'<div class="empty">順位表データはまだありません</div>';
$('player-list').innerHTML=store.players.length?[...store.players].sort((a,b)=>b.goals-a.goals).map(p=>{const i=store.players.indexOf(p);return `<div class="preview-item"><span>${esc(p.name)}（G:${p.goals} / A:${p.assists}）</span><button class="btn btn-red" onclick="removeItem('players',${i})">削除</button></div>`}).join(''):'<div class="empty">選手データはまだありません</div>'}
function removeItem(type,index){store[type].splice(index,1);updatePreview()}
function syncHero(){store.hero={played:num('hero-played'),wins:num('hero-wins'),goals:num('hero-goals'),rank:text('hero-rank')||'-'}}
function autoCalcHero(){store.hero.played=store.matches.length;store.hero.wins=store.matches.filter(m=>m.result==='W').length;store.hero.goals=store.matches.reduce((s,m)=>s+Number(m.shome||0),0);updatePreview()}
function addMatch(){const opp=text('match-opp');if(!opp){alert('対戦相手を入力してください');return}store.matches.unshift({date:text('match-date')||new Date().toISOString().slice(0,10).replaceAll('-','.'),round:text('match-round')||'試合',opp,result:$('match-result').value,shome:num('match-shome'),saway:num('match-saway'),yt1:text('match-yt1'),yt2:text('match-yt2')});$('match-opp').value='';$('match-yt1').value='';$('match-yt2').value='';updatePreview()}
function addStanding(){const name=text('std-name');if(!name){alert('チーム名を入力してください');return}const gf=num('std-gf'),ga=num('std-ga');store.standings.push({rank:num('std-rank')||1,name,p:num('std-p'),w:num('std-w'),d:num('std-d'),l:num('std-l'),gf,ga,diff:gf-ga,pts:num('std-pts'),form:text('std-form').toUpperCase()});$('std-name').value='';updatePreview()}
function addPlayer(){const name=text('player-name');if(!name){alert('選手名を入力してください');return}const found=store.players.find(p=>p.name===name);if(found){found.goals=num('player-goals');found.assists=num('player-assists')}else store.players.push({name,goals:num('player-goals'),assists:num('player-assists')});$('player-name').value='';updatePreview()}
function getYTId(url){if(!url)return'';try{const u=new URL(url);if(u.hostname.includes('youtu.be'))return u.pathname.slice(1).split('/')[0];if(u.searchParams.get('v'))return u.searchParams.get('v');const p=u.pathname.split('/').filter(Boolean);const n=p.findIndex(x=>['embed','shorts','live'].includes(x));return n>=0?p[n+1]||'':''}catch{return''}}
function exportHTML() {
  syncHero();
  save();
  store.hero.played = document.getElementById('hero-played').value;
  store.hero.wins = document.getElementById('hero-wins').value;
  store.hero.goals = document.getElementById('hero-goals').value;
  store.hero.rank = document.getElementById('hero-rank').value;
  save();

  let txtStandings = '';
  store.standings.sort((a,b)=>a.rank-b.rank).forEach(item => {
    const isHighlight = item.name.includes('SUNFIRES') ? ' class="rank-highlight"' : '';
    let badges = '';
    let chars = item.form.split('');
    for(let i=0; i<10; i++) {
      let c = chars[i] || '－';
      let bClass = c === 'W' ? 'form-W' : c === 'L' ? 'form-L' : c === 'D' ? 'form-D' : 'form-N';
      badges += `<span class="form-badge ${bClass}">${c}</span>`;
    }
    txtStandings += `<tr${isHighlight}><td>${item.rank}</td><td>${item.name}</td><td>${item.p}</td><td>${item.w}</td><td>${item.d}</td><td>${item.l}</td><td>${item.gf}</td><td>${item.ga}</td><td>${item.diff>0?'+'+item.diff:item.diff}</td><td>${badges}</td><td class="pts">${item.pts}</td></tr>\n`;
  });

  let txtResults = '';
  store.matches.forEach(item => {
    const cH = parseInt(item.shome) >= parseInt(item.saway) ? 'win' : 'lose';
    const cA = parseInt(item.saway) >= parseInt(item.shome) ? 'win' : 'lose';
    txtResults += `<div class="match-card"><div class="match-meta"><span>${item.date}</span><span class="match-round">${item.round}</span></div><div class="match-teams"><div class="team-name home">SUNFIRES</div><div class="score"><span class="${cH}">${item.shome}</span><span class="score-sep">:</span><span class="${cA}">${item.saway}</span></div><div class="team-name away">${item.opp}</div></div><div class="match-actions">${item.yt1?`<button class="btn-small btn-video" onclick="window.open('${item.yt1}')">▶ 前半動画</button>`:''}${item.yt2?`<button class="btn-small btn-video" onclick="window.open('${item.yt2}')">▶ 後半動画</button>`:''}</div></div>\n`;
  });

  let txtVideos = '';
  store.matches.forEach(item => {
    const y1 = getYTId(item.yt1);
    const y2 = getYTId(item.yt2);
    if(y1 || y2) {
      txtVideos += `<div class="highlight-card" style="grid-column: span 2; background: var(--navy-mid); border: 1px solid var(--court-line); padding: 1rem; border-radius: 4px; margin-bottom: 1rem;"><div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--orange);">${item.round} vs ${item.opp} (${item.date})</div><div style="display: grid; grid-template-columns: ${y1&&y2?'1fr 1fr':'1fr'}; gap: 1rem;">${y1?`<div><div style="font-size: 0.75rem; color: var(--gray); margin-bottom: 0.25rem;">▶ 前半</div><div style="position:relative; aspect-ratio:16/9; background:#000;"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${y1}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe></div></div>`:''}${y2?`<div><div style="font-size: 0.75rem; color: var(--gray); margin-bottom: 0.25rem;">▶ 後半</div><div style="position:relative; aspect-ratio:16/9; background:#000;"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${y2}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe></div></div>`:''}</div></div>\n`;
    }
  });

  let txtGoals = '', txtAssists = '';
  [...store.players].filter(p=>p.goals>0).sort((a,b)=>b.goals-a.goals).forEach((p,x)=>{
    txtGoals += `<tr class="${x===0?'top-player':''}"><td class="rank-col">${x+1}</td><td class="player-name">${p.name}</td><td class="player-stat">${p.goals}</td></tr>\n`;
  });
  [...store.players].filter(p=>p.assists>0).sort((a,b)=>b.assists-a.assists).forEach((p,x)=>{
    txtAssists += `<tr class="${x===0?'top-player':''}"><td class="rank-col">${x+1}</td><td class="player-name">${p.name}</td><td class="player-stat">${p.assists}</td></tr>\n`;
  });

  const out = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNFIRES | Futsal Team</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --orange: #FF5500; --orange-light: #FF7733; --navy: #1A0D00; --navy-mid: #221200; --navy-light: #2E1A05; --court-line: #5A2E00; --white: #FFF5F0; --gray: #B09080; --gold: #FFD166; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--navy); color: var(--white); font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }
  nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(13, 27, 42, 0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--court-line); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; color: var(--orange); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--gray); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--orange); }
  .hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 60px; }
  .court-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,85,0,0.20) 0%, transparent 70%); }
  .court-lines { position: absolute; inset: 0; opacity: 1; pointer-events:none; }
  .court-lines svg { width: 100%; height: 100%; }
  .hero-content { position: relative; z-index: 2; padding: 4rem 4rem; max-width: 1200px; margin: 0 auto; width: 100%; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 12vw, 10rem); line-height: 0.9; letter-spacing: 0.04em; margin-bottom: 1.5rem; }
  .hero-title .accent { color: var(--orange); }
  .hero-subtitle { font-size: 1rem; color: #D8B8A8; max-width: 480px; line-height: 1.8; margin-bottom: 3rem; }
  .hero-stats { display: flex; gap: 3rem; flex-wrap: wrap; }
  .stat-item { border-left: 2px solid var(--orange); padding-left: 1rem; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--white); line-height: 1; }
  .stat-label { font-size: 0.7rem; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; }
  section { padding: 5rem 4rem; max-width: 1200px; margin: 0 auto; }
  .section-header { display: flex; align-items: baseline; gap: 1.5rem; margin-bottom: 3rem; border-bottom: 1px solid var(--court-line); padding-bottom: 1rem; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.06em; }
  .section-en { font-size: 0.7rem; color: var(--orange); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; }
  .standings-section { background: var(--navy-mid); border-radius: 0; border-top: 1px solid var(--court-line); border-bottom: 1px solid var(--court-line); }
  .standings-section > * { max-width: 1200px; margin: 0 auto; padding-left: 4rem; padding-right: 4rem; }
  .standings-section section { padding: 5rem 4rem; }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th { font-size: 0.65rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.15em; padding: 0.75rem 1rem; text-align: right; border-bottom: 1px solid var(--court-line); font-weight: 700; }
  .standings-table th:first-child, .standings-table th:nth-child(2) { text-align: left; }
  .standings-table td { padding: 1rem 1rem; text-align: right; border-bottom: 1px solid rgba(42,74,122,0.5); font-size: 0.9rem; }
  .standings-table td:first-child { text-align: left; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--gray); width: 48px; }
  .standings-table td:nth-child(2) { text-align: left; font-weight: 700; }
  .standings-table tr:hover td { background: rgba(255,107,26,0.05); }
  .rank-1 td:first-child { color: var(--gold); }
  .rank-highlight td:nth-child(2) { color: var(--orange); }
  .pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--orange); }
  .form-badge { display: inline-block; width: 20px; height: 20px; border-radius: 3px; font-size: 0.65rem; font-weight: 900; text-align: center; line-height: 20px; margin: 0 1px; }
  .form-W { background: #22C55E; color: #fff; }
  .form-L { background: #EF4444; color: #fff; }
  .form-D { background: #6B7280; color: #fff; }
  .form-N { background: transparent; color: var(--gray); border: 1px solid var(--court-line); }
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
  .match-card { background: var(--navy-mid); border: 1px solid var(--court-line); border-radius: 4px; padding: 1.5rem; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.2s; cursor: pointer; }
  .match-card:hover { border-color: var(--orange); transform: translateY(-2px); }
  .match-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--orange); opacity: 0; transition: opacity 0.2s; }
  .match-card:hover::before { opacity: 1; }
  .match-meta { font-size: 0.65rem; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .match-round { background: var(--navy-light); padding: 0.2rem 0.6rem; border-radius: 2px; font-weight: 700; }
  .match-teams { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .team-name { flex: 1; font-weight: 700; font-size: 0.95rem; }
  .team-name.away { text-align: right; color: var(--gray); }
  .team-name.home { color: var(--white); }
  .score { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.05em; display: flex; gap: 0.3rem; align-items: center; }
  .score-sep { color: var(--gray); font-size: 1.8rem; }
  .score .win { color: var(--orange); }
  .score .lose { color: var(--gray); }
  .match-actions { display: flex; gap: 0.75rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--court-line); }
  .btn-small { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.4rem 0.8rem; border-radius: 2px; border: none; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; transition: all 0.2s; }
  .btn-video { background: var(--orange); color: white; }
  .btn-video:hover { background: var(--orange-light); }
  .highlights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
