<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNFIRES 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF5500;
    --orange-light: #FF7733;
    --dark: #1A0D00;
    --mid: #221200;
    --light: #2E1A05;
    --border: #5A2E00;
    --white: #FFF5F0;
    --gray: #B09080;
    --gold: #FFD166;
    --green: #22C55E;
    --red: #EF4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  header {
    background: var(--mid);
    border-bottom: 2px solid var(--orange);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--orange);
    letter-spacing: 0.05em;
  }

  .container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
  }

  .panel {
    background: var(--mid);
    border: 1px solid var(--border);
    padding: 1.5rem;
    border-radius: 4px;
  }

  .panel-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  label {
    font-size: 0.8rem;
    color: var(--gray);
    font-weight: 700;
  }

  input, select, textarea {
    background: var(--light);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 0.6rem;
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.9rem;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--orange);
  }

  .btn {
    background: var(--orange);
    color: var(--white);
    border: none;
    padding: 0.6rem 1.2rem;
    font-weight: 700;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 0.9rem;
  }

  .btn:hover { background: var(--orange-light); }
  .btn-green { background: var(--green); }
  .btn-green:hover { background: #4ade80; }
  .btn-red { background: var(--red); }
  .btn-red:hover { background: #f87171; }

  .preview-box {
    margin-top: 1.5rem;
    background: rgba(0,0,0,0.2);
    border: 1px dashed var(--border);
    padding: 1rem;
    max-height: 300px;
    overflow-y: auto;
  }

  .preview-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(90,46,0,0.3);
    font-size: 0.9rem;
  }

  .main-actions {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(26,13,0,0.95);
    border-top: 2px solid var(--orange);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
  }
</style>
</head>
<body>

<header>
  <div class="logo">SUNFIRES ADMIN</div>
  <div style="font-size:0.8rem; color:var(--gray);">データはブラウザに自動保存されます</div>
</header>

<div class="container">

  <div class="panel">
    <div class="panel-title">
      <span>1. カウンター数値指定</span>
      <button class="btn btn-green" onclick="autoCalcHero()" style="font-size:0.75rem; padding:0.3rem 0.6rem;">自動計算する</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>総試合数</label><input type="number" id="hero-played" value="0"></div>
      <div class="form-group"><label>総勝利数</label><input type="number" id="hero-wins" value="0"></div>
      <div class="form-group"><label>総得点数</label><input type="number" id="hero-goals" value="0"></div>
      <div class="form-group"><label>現在順位</label><input type="text" id="hero-rank" value="3位"></div>
    </div>
    <div class="form-group">
      <label>サブタイトル説明文</label>
      <input type="text" id="hero-subtitle" value="週末のコートで全力疾走するおっさんたちの記録。">
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">2. 試合結果・動画の追加</div>
    <div class="form-grid">
      <div class="form-group"><label>試合日</label><input type="text" id="match-date" placeholder="2025.06.08"></div>
      <div class="form-group"><label>節 / 大会名</label><input type="text" id="match-round" placeholder="第12節"></div>
      <div class="form-group"><label>対戦相手</label><input type="text" id="match-opp" placeholder="レッドスターFC"></div>
      <div class="form-group">
        <label>結果</label>
        <select id="match-result">
          <option value="W">○ 勝利</option>
          <option value="D">△ 引分</option>
          <option value="L">● 敗北</option>
        </select>
      </div>
    </div>
    <div class="form-grid" style="grid-template-columns: 1fr 1fr repeat(2, 2fr);">
      <div class="form-group"><label>自得点</label><input type="number" id="match-shome" value="0"></div>
      <div class="form-group"><label>相手得点</label><input type="number" id="match-saway" value="0"></div>
      <div class="form-group"><label>YouTube 【前半】 URL (任意)</label><input type="text" id="match-yt1" placeholder="https://..."></div>
      <div class="form-group"><label>YouTube 【後半】 URL (任意)</label><input type="text" id="match-yt2" placeholder="https://..."></div>
    </div>
    <button class="btn" onclick="addMatch()">試合データを追加</button>
    <div class="preview-box" id="match-list"></div>
  </div>

  <div class="panel">
    <div class="panel-title">3. リーグ順位表チームの追加</div>
    <div class="form-grid">
      <div class="form-group" style="flex:0.5;"><label>順位</label><input type="number" id="std-rank" value="1"></div>
      <div class="form-group" style="flex:2;"><label>チーム名</label><input type="text" id="std-name" placeholder="SUNFIRES ★"></div>
      <div class="form-group"><label>試合数</label><input type="number" id="std-p" value="0"></div>
      <div class="form-group"><label>勝</label><input type="number" id="std-w" value="0"></div>
      <div class="form-group"><label>分</label><input type="number" id="std-d" value="0"></div>
      <div class="form-group"><label>負</label><input type="number" id="std-l" value="0"></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>得点</label><input type="number" id="std-gf" value="0"></div>
      <div class="form-group"><label>失点</label><input type="number" id="std-ga" value="0"></div>
      <div class="form-group"><label>勝点</label><input type="number" id="std-pts" value="0"></div>
      <div class="form-group" style="flex:2;"><label>直近10試合の勝敗 (例: WWDL...)</label><input type="text" id="std-form" placeholder="WW"></div>
    </div>
    <button class="btn" onclick="addStanding()">順位表チームを追加</button>
    <div class="preview-box" id="std-list"></div>
  </div>

  <div class="panel">
    <div class="panel-title">4. 選手スタッツの管理</div>
    <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr;">
      <div class="form-group"><label>選手名</label><input type="text" id="p-name" placeholder="田中 健一"></div>
      <div class="form-group"><label>得点数</label><input type="number" id="p-goals" value="0"></div>
      <div class="form-group"><label>アシスト数</label><input type="number" id="p-assists" value="0"></div>
    </div>
    <button class="btn" onclick="addPlayer()">選手データを追加・更新</button>
    <div class="preview-box" id="player-list"></div>
  </div>

</div>

<div class="main-actions">
  <button class="btn btn-red" onclick="clearAllData()">全データを初期化</button>
  <button class="btn btn-green" style="padding: 1rem 2rem; font-size: 1.1rem;" onclick="exportHTML()">🔥 公開用 index.html を書き出し</button>
</div>

<script>
// 元のデータ保持構造を完全維持
let data = {
  hero: { played: 2, wins: 2, goals: 38, rank: "3位", subtitle: "週末のコートで全力疾走するおっさんたちの記録。" },
  matches: [
    { date: "2025.06.08", round: "第12節", opp: "レッドスターFC", result: "W", shome: 4, saway: 2, yt1: "https://www.youtube.com/watch?v=dSIO3AdVRIs", yt2: "" }
  ],
  standings: [
    { rank: 1, name: "サンダーボルト", p: 2, w: 2, d: 2, l: 1, gf: 54, ga: 22, diff: 32, pts: 29, form: "WW" },
    { rank: 3, name: "SUNFIRES ★", p: 2, w: 2, d: 2, l: 3, gf: 38, ga: 29, diff: 9, pts: 23, form: "WW" }
  ],
  players: [
    { name: "田中 健一", goals: 12, assists: 7 },
    { name: "中村 俊介", goals: 4, assists: 10 }
  ]
};

if (localStorage.getItem('sunfires_data')) {
  try { data = JSON.parse(localStorage.getItem('sunfires_data')); } catch(e){}
}

function saveAll() {
  localStorage.setItem('sunfires_data', JSON.stringify(data));
}

function getYTId(url) {
  if(!url) return '';
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : '';
}

// 元の updatePreview 関数を完全維持・バグをクリーンアップ
function updatePreview() {
  saveAll();

  // 試合表示
  document.getElementById('match-list').innerHTML = data.matches.map((m, i) => `
    <div class="preview-item">
      <span>${m.date} [${m.round}] SUNFIRES ${m.shome}-${m.saway} ${m.opp} (${m.result}) ${m.yt1?'[前]':''} ${m.yt2?'[後]':''}</span>
      <button class="btn-del" onclick="deleteMatch(${i})">削除</button>
    </div>
  `).join('');

  // 順位表表示
  document.getElementById('std-list').innerHTML = data.standings.sort((a,b)=>a.rank-b.rank).map((s, i) => `
    <div class="preview-item">
      <span>#${s.rank} ${s.name} (勝点:${s.pts} / 直近:${s.form})</span>
      <button class="btn-del" onclick="deleteStanding(${i})">削除</button>
    </div>
  `).join('');

  // 選手表示
  document.getElementById('player-list').innerHTML = data.players.sort((a,b)=>b.goals-a.goals).map((p, i) => `
    <div class="preview-item">
      <span>${p.name} (G:${p.goals} / A:${p.assists})</span>
      <button class="btn-del" onclick="deletePlayer(${i})">削除</button>
    </div>
  `).join('');

  // Hero値同期
  const h = data.hero || {};
  document.getElementById('hero-played').value = h.played || 0;
  document.getElementById('hero-wins').value = h.wins || 0;
  document.getElementById('hero-goals').value = h.goals || 0;
  document.getElementById('hero-rank').value = h.rank || "3位";
  document.getElementById('hero-subtitle').value = h.subtitle || "週末のコートで全力疾走するおっさんたちの記録。";
}

function addMatch() {
  const date = document.getElementById('match-date').value || '2025.06.08';
  const round = document.getElementById('match-round').value || '第-節';
  const opp = document.getElementById('match-opp').value || '対戦相手';
  const result = document.getElementById('match-result').value;
  const shome = parseInt(document.getElementById('match-shome').value) || 0;
  const saway = parseInt(document.getElementById('match-saway').value) || 0;
  const yt1 = document.getElementById('match-yt1').value;
  const yt2 = document.getElementById('match-yt2').value;

  data.matches.unshift({ date, round, opp, result, shome, saway, yt1, yt2 });
  updatePreview();
  document.getElementById('match-opp').value = '';
  document.getElementById('match-yt1').value = '';
  document.getElementById('match-yt2').value = '';
}
function deleteMatch(i) { data.matches.splice(i,1); updatePreview(); }

function addStanding() {
  const rank = parseInt(document.getElementById('std-rank').value) || 1;
  const name = document.getElementById('std-name').value || 'チーム';
  const p = parseInt(document.getElementById('std-p').value) || 0;
  const w = parseInt(document.getElementById('std-w').value) || 0;
  const d = parseInt(document.getElementById('std-d').value) || 0;
  const l = parseInt(document.getElementById('std-l').value) || 0;
  const gf = parseInt(document.getElementById('std-gf').value) || 0;
  const ga = parseInt(document.getElementById('std-ga').value) || 0;
  const pts = parseInt(document.getElementById('std-pts').value) || 0;
  const form = document.getElementById('std-form').value || '';
  const diff = gf - ga;

  data.standings.push({ rank, name, p, w, d, l, gf, ga, diff, pts, form });
  updatePreview();
  document.getElementById('std-name').value = '';
}
function deleteStanding(i) { data.standings.splice(i,1); updatePreview(); }

function addPlayer() {
  const name = document.getElementById('p-name').value;
  const goals = parseInt(document.getElementById('p-goals').value) || 0;
  const assists = parseInt(document.getElementById('p-assists').value) || 0;
  if(!name) return;

  const exist = data.players.find(p => p.name === name);
  if(exist) { exist.goals = goals; exist.assists = assists; }
  else { data.players.push({ name, goals, assists }); }
  updatePreview();
  document.getElementById('p-name').value = '';
  document.getElementById('p-goals').value = 0;
  document.getElementById('p-assists').value = 0;
}
function deletePlayer(i) { data.players.splice(i,1); updatePreview(); }

function autoCalcHero() {
  data.hero.played = data.matches.length;
  data.hero.wins = data.matches.filter(m => m.result === 'W').length;
  data.hero.goals = data.players.reduce((sum, p) => sum + p.goals, 0);
  updatePreview();
}

function clearAllData() {
  if(confirm('すべての入力データをリセットしますか？')) {
    data = { hero:{played:0,wins:0,goals:0,rank:"-位",subtitle:""}, matches:[], standings:[], players:[] };
    updatePreview();
  }
}

// 元の exportHTML を拡張し、動画2面分割 ＆ エンブレム仕様を統合
function exportHTML() {
  data.hero.played = document.getElementById('hero-played').value;
  data.hero.wins = document.getElementById('hero-wins').value;
  data.hero.goals = document.getElementById('hero-goals').value;
  data.hero.rank = document.getElementById('hero-rank').value;
  data.hero.subtitle = document.getElementById('hero-subtitle').value;
  saveAll();

  // 1. 順位表
  let htmlStandings = '';
  data.standings.sort((a,b)=>a.rank-b.rank).forEach(item => {
    const isHighlight = item.name.includes('SUNFIRES') ? ' class="rank-highlight"' : '';
    let badges = '';
    let chars = item.form.split('');
    for(let i=0; i<10; i++) {
      let c = chars[i] || '－';
      let bClass = c === 'W' ? 'form-W' : c === 'L' ? 'form-L' : c === 'D' ? 'form-D' : 'form-N';
      badges += `<span class="form-badge ${bClass}">${c}</span>`;
    }
    htmlStandings += `<tr${isHighlight}><td>${item.rank}</td><td>${item.name}</td><td>${item.p}</td><td>${item.w}</td><td>${item.d}</td><td>${item.l}</td><td>${item.gf}</td><td>${item.ga}</td><td>${item.diff>0?'+'+item.diff:item.diff}</td><td>${badges}</td><td class="pts">${item.pts}</td></tr>\n`;
  });

  // 2. 試合結果
  let htmlResults = '';
  data.matches.forEach(item => {
    const cH = parseInt(item.shome) >= parseInt(item.saway) ? 'win' : 'lose';
    const cA = parseInt(item.saway) >= parseInt(item.shome) ? 'win' : 'lose';
    htmlResults += `<div class="match-card"><div class="match-meta"><span>${item.date}</span><span class="match-round">${item.round}</span></div><div class="match-teams"><div class="team-name home">SUNFIRES</div><div class="score"><span class="${cH}">${item.shome}</span><span class="score-sep">:</span><span class="${cA}">${item.saway}</span></div><div class="team-name away">${item.opp}</div></div><div class="match-actions">${item.yt1?`<button class="btn-small btn-video" onclick="window.open('${item.yt1}')">▶ 前半動画</button>`:''}${item.yt2?`<button class="btn-small btn-video" onclick="window.open('${item.yt2}')">▶ 後半動画</button>`:''}</div></div>\n`;
  });

  // 3. 試合動画 (2画面分割表示対応)
  let htmlVideos = '';
  data.matches.forEach(item => {
    const y1 = getYTId(item.yt1);
    const y2 = getYTId(item.yt2);
    if(y1 || y2) {
      htmlVideos += `<div class="highlight-card" style="grid-column: span 2; background: var(--navy-mid); border: 1px solid var(--court-line); padding: 1rem; border-radius: 4px; margin-bottom: 1rem;"><div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--orange);">${item.round} vs ${item.opp} (${item.date})</div><div style="display: grid; grid-template-columns: ${y1&&y2?'1fr 1fr':'1fr'}; gap: 1rem;">${y1?`<div><div style="font-size: 0.75rem; color: var(--gray); margin-bottom: 0.25rem;">▶ 前半</div><div style="position:relative; aspect-ratio:16/9; background:#000;"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${y1}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe></div></div>`:''}${y2?`<div><div style="font-size: 0.75rem; color: var(--gray); margin-bottom: 0.25rem;">▶ 後半</div><div style="position:relative; aspect-ratio:16/9; background:#000;"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${y2}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe></div></div>`:''}</div></div>\n`;
    }
  });

  // 4. 個人成績
  let htmlGoals = '', htmlAssists = '';
  [...data.players].filter(p=>p.goals stroke-width="0">0).sort((a,b)=>b.goals-a.goals).forEach((p,x)=>{
    htmlGoals += `<tr class="${x===0?'top-player':''}"><td class="rank-col">${x+1}</td><td class="player-name">${p.name}</td><td class="player-stat">${p.goals}</td></tr>\n`;
  });
  [...data.players].filter(p=>p.assists>0).sort((a,b)=>b.assists-a.assists).forEach((p,x)=>{
    htmlAssists += `<tr class="${x===0?'top-player':''}"><td class="rank-col">${x+1}</td><td class="player-name">${p.name}</td><td class="player-stat">${p.assists}</td></tr>\n`;
  });

  // 出力用 index.html テンプレートテンプレート (元の完璧なフロントエンドCSS/SVGガワ)
  const out = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNFIRES | Futsal Team</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --orange: #FF5500; --orange-light: #FF7733; --navy: #1A0D00; --navy-mid: #221200; --navy-light: #2E1A05; --court-line: #5A2E00; --white: #FFF5F0; --gray: #B09080; --gold: #FFD166; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--navy); color: var(--white); font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }
  nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(13, 27, 42, 0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--court-line); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; color: var(--orange); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--gray); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--orange); }
  .hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 60px; }
  .court-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,85,0,0.12) 0%, transparent 70%); }
  .court-lines { position: absolute; inset: 0; opacity: 1; }
  .court-lines svg { width: 100%; height: 100%; }
  .hero-content { position: relative; z-index: 2; padding: 4rem 4rem; max-width: 1200px; margin: 0 auto; width: 100%; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 12vw, 10rem); line-height: 0.9; letter-spacing: 0.04em; margin-bottom: 1.5rem; }
  .hero-title .accent { color: var(--orange); }
  .hero-subtitle { font-size: 1rem; color: var(--gray); max-width: 480px; line-height: 1.8; margin-bottom: 3rem; }
  .hero-stats { display: flex; gap: 3rem; }
  .stat-item { border-left: 2px solid var(--orange); padding-left: 1rem; }
