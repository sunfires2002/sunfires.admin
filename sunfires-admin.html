<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNFIRES 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF5500;
    --orange-light: #FF7733;
    --navy: #1A0D00;
    --navy-mid: #221200;
    --navy-light: #2E1A05;
    --court-line: #5A2E00;
    --white: #FFF5F0;
    --gray: #B09080;
    --gold: #FFD166;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    padding: 20px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--orange);
    font-size: 2.5rem;
    margin-bottom: 20px;
    border-bottom: 2px solid var(--court-line);
    padding-bottom: 10px;
  }

  .admin-box {
    background: var(--navy-mid);
    border: 1px solid var(--court-line);
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 4px;
  }

  .admin-box h2 {
    font-size: 1.1rem;
    color: var(--orange-light);
    margin-bottom: 15px;
  }

  .form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }

  .form-group {
    flex: 1;
    min-width: 150px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  label {
    font-size: 0.8rem;
    color: var(--gray);
    font-weight: 700;
  }

  input, select, textarea {
    background: var(--navy-light);
    border: 1px solid var(--court-line);
    color: var(--white);
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 0.9rem;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--orange);
  }

  .btn {
    background: var(--orange);
    color: white;
    border: none;
    padding: 10px 20px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn:hover { background: var(--orange-light); }

  .btn-calc {
    background: #22C55E;
    margin-bottom: 15px;
  }
  .btn-calc:hover { background: #16A34A; }

  .btn-export {
    background: #0077FF;
    font-size: 1.2rem;
    padding: 15px 30px;
    width: 100%;
    margin-top: 20px;
    box-shadow: 0 4px 14px rgba(0,119,255,0.4);
  }
  .btn-export:hover { background: #3399FF; }

  .preview-area {
    margin-top: 15px;
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 4px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 0.85rem;
  }

  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px;
    border-bottom: 1px solid var(--navy-light);
  }

  .btn-del {
    background: #EF4444;
    color: white;
    border: none;
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<h1>SUNFIRES WEB ADMIN</h1>

<div class="admin-box">
  <h2>0. チームエンブレム画像の指定</h2>
  <div class="form-row">
    <div class="form-group">
      <label>エンブレム画像を選択 (パソコン内にあるロゴ画像ファイルを選んでください)</label>
      <input type="file" id="emblem-file" accept="image/*" onchange="loadEmblem(this)">
      <div id="emblem-preview-text" style="font-size: 0.8rem; color: var(--gray); margin-top: 5px;">※選択すると自動的に保存され、サイトの中央に埋め込まれます。</div>
    </div>
  </div>
</div>

<div class="admin-box">
  <h2>1. トップ画面 カウンター（手動入力も可能）</h2>
  <button class="btn btn-calc" onclick="autoCalcHero()">⚽ 試合結果・選手データから自動計算する</button>
  <div class="form-row">
    <div class="form-group"><label>総試合数</label><input type="number" id="hero-played" value="2"></div>
    <div class="form-group"><label>総勝利数</label><input type="number" id="hero-wins" value="2"></div>
    <div class="form-group"><label>総得点数</label><input type="number" id="hero-goals" value="38"></div>
    <div class="form-group"><label>現在順位</label><input type="text" id="hero-rank" value="3位"></div>
  </div>
</div>

<div class="admin-box">
  <h2>2. 試合結果・動画の追加</h2>
  <div class="form-row">
    <div class="form-group"><label>試合日</label><input type="text" id="m-date" placeholder="2026.06.18"></div>
    <div class="form-group"><label>節 / 大会名</label><input type="text" id="m-round" placeholder="第12節"></div>
    <div class="form-group"><label>対戦相手</label><input type="text" id="m-opp" placeholder="レッドスターFC"></div>
    <div class="form-group">
      <label>勝敗</label>
      <select id="m-result">
        <option value="W">○ 勝利</option>
        <option value="D">△ 引分</option>
        <option value="L">● 敗北</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group" style="max-width: 120px;"><label>SUNFIRES得点</label><input type="number" id="m-shome" value="0"></div>
    <div class="form-group" style="max-width: 120px;"><label>相手得点</label><input type="number" id="m-saway" value="0"></div>
    <div class="form-group"><label>YouTube動画URL 【前半】</label><input type="text" id="m-yt1" placeholder="https://..."></div>
    <div class="form-group"><label>YouTube動画URL 【後半】</label><input type="text" id="m-yt2" placeholder="https://..."></div>
  </div>
  <button class="btn" onclick="addMatch()">＋ 試合を追加</button>
  <div class="preview-area" id="list-matches"></div>
</div>

<div class="admin-box">
  <h2>3. リーグ順位表チームの追加</h2>
  <div class="form-row">
    <div class="form-group" style="max-width: 80px;"><label>順位</label><input type="number" id="s-rank" value="1"></div>
    <div class="form-group"><label>チーム名</label><input type="text" id="s-name" placeholder="SUNFIRES ★"></div>
    <div class="form-group" style="max-width: 80px;"><label>試合数</label><input type="number" id="s-p" value="0"></div>
    <div class="form-group" style="max-width: 60px;"><label>勝</label><input type="number" id="s-w" value="0"></div>
    <div class="form-group" style="max-width: 60px;"><label>分</label><input type="number" id="s-d" value="0"></div>
    <div class="form-group" style="max-width: 60px;"><label>負</label><input type="number" id="s-l" value="0"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>得点</label><input type="number" id="s-gf" value="0"></div>
    <div class="form-group"><label>失点</label><input type="number" id="s-ga" value="0"></div>
    <div class="form-group"><label>勝点</label><input type="number" id="s-pts" value="0"></div>
    <div class="form-group"><label>直近10試合 (例: WWDL...)</label><input type="text" id="s-form" placeholder="WW"></div>
  </div>
  <button class="btn" onclick="addStanding()">＋ 順位表チームを追加</button>
  <div class="preview-area" id="list-standings"></div>
</div>

<div class="admin-box">
  <h2>4. 選手個人スタッツの追加・更新</h2>
  <div class="form-row">
    <div class="form-group"><label>選手名</label><input type="text" id="p-name" placeholder="田中 健一"></div>
    <div class="form-group"><label>得点数 (G)</label><input type="number" id="p-g" value="0"></div>
    <div class="form-group"><label>アシスト数 (A)</label><input type="number" id="p-a" value="0"></div>
  </div>
  <button class="btn" onclick="addPlayer()">＋ 選手を追加/更新</button>
  <div class="preview-area" id="list-players"></div>
</div>

<button class="btn btn-export" onclick="exportHTML()">🔥 公開用 index.html を生成してダウンロード</button>

<script>
let store = {
  emblemData: "", // Base64形式の画像データ
  hero: { played: 2, wins: 2, goals: 38, rank: "3位" },
  matches: [
    { date: "2025.06.08", round: "第12節", opp: "レッドスターFC", result: "W", shome: 4, saway: 2, yt1: "https://www.youtube.com/watch?v=dSIO3AdVRIs", yt2: "" }
  ],
  standings: [
    { rank: 1, name: "サンダーボルト", p: 2, w: 2, d: 2, l: 1, gf: 54, ga: 22, diff: 32, pts: 29, form: "WW" },
    { rank: 3, name: "SUNFIRES ★", p: 2, w: 2, d: 2, l: 3, gf: 38, ga: 29, diff: 9, pts: 23, form: "WW" }
  ],
  players: [
    { name: "田中 健一", g: 12, a: 7 },
    { name: "中村 俊介", g: 4, a: 10 }
  ]
};

if (localStorage.getItem('sunfires_admin_data')) {
  try { store = JSON.parse(localStorage.getItem('sunfires_admin_data')); } catch(e){}
}

function save() {
  localStorage.setItem('sunfires_admin_data', JSON.stringify(store));
}

function loadEmblem(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      store.emblemData = e.target.result;
      save();
      document.getElementById('emblem-preview-text').innerText = "✅ 画像の読み込みに成功しました！次回書き出し時に反映されます。";
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function getYTId(url) {
  if(!url) return '';
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : '';
}

function render() {
  document.getElementById('hero-played').value = store.hero.played;
  document.getElementById('hero-wins').value = store.hero.wins;
  document.getElementById('hero-goals').value = store.hero.goals;
  document.getElementById('hero-rank').value = store.hero.rank;
  
  if(store.emblemData) {
    document.getElementById('emblem-preview-text').innerText = "✅ エンブレム画像が保存されています";
  }

  const mDiv = document.getElementById('list-matches');
  mDiv.innerHTML = '';
  store.matches.forEach((m, i) => {
    mDiv.innerHTML += `<div class="item-row">
      <span>${m.date} [${m.round}] SUNFIRES ${m.shome}-${m.saway} ${m.opp} (${m.result})</span>
      <button class="btn-del" onclick="store.matches.splice(${i},1);save();render();">削除</button>
    </div>`;
  });

  const sDiv = document.getElementById('list-standings');
  sDiv.innerHTML = '';
  store.standings.sort((a,b)=>a.rank-b.rank).forEach((s, i) => {
    sDiv.innerHTML += `<div class="item-row">
      <span>#${s.rank} ${s.name} (試:${s.p} 勝点:${s.pts})</span>
      <button class="btn-del" onclick="store.standings.splice(${i},1);save();render();">削除</button>
    </div>`;
  });

  const pDiv = document.getElementById('list-players');
  pDiv.innerHTML = '';
  store.players.sort((a,b)=>b.g-a.g).forEach((p, i) => {
    pDiv.innerHTML += `<div class="item-row">
      <span>${p.name} (得点:${p.g} アシスト:${p.a})</span>
      <button class="btn-del" onclick="store.players.splice(${i},1);save();render();">削除</button>
    </div>`;
  });
}

function addMatch() {
  const date = document.getElementById('m-date').value || '2026.06.18';
  const round = document.getElementById('m-round').value || '第-節';
  const opp = document.getElementById('m-opp').value || '対戦相手';
  const result = document.getElementById('m-result').value;
  const shome = parseInt(document.getElementById('m-shome').value) || 0;
  const saway = parseInt(document.getElementById('m-saway').value) || 0;
  const yt1 = document.getElementById('m-yt1').value;
  const yt2 = document.getElementById('m-yt2').value;

  store.matches.unshift({ date, round, opp, result, shome, saway, yt1, yt2 });
  save(); render();
  document.getElementById('m-opp').value = '';
  document.getElementById('m-yt1').value = '';
  document.getElementById('m-yt2').value = '';
}

function addStanding() {
  const rank = parseInt(document.getElementById('s-rank').value) || 1;
  const name = document.getElementById('s-name').value || 'チーム';
  const p = parseInt(document.getElementById('s-p').value) || 0;
  const w = parseInt(document.getElementById('s-w').value) || 0;
  const d = parseInt(document.getElementById('s-d').value) || 0;
  const l = parseInt(document.getElementById('s-l').value) || 0;
  const gf = parseInt(document.getElementById('s-gf').value) || 0;
  const ga = parseInt(document.getElementById('s-ga').value) || 0;
  const pts = parseInt(document.getElementById('s-pts').value) || 0;
  const form = document.getElementById('s-form').value || '';
  const diff = gf - ga;

  store.standings.push({ rank, name, p, w, d, l, gf, ga, diff, pts, form });
  save(); render();
  document.getElementById('s-name').value = '';
  document.getElementById('s-rank').value = store.standings.length + 1;
}

function addPlayer() {
  const name = document.getElementById('p-name').value;
  const g = parseInt(document.getElementById('p-g').value) || 0;
  const a = parseInt(document.getElementById('p-a').value) || 0;
  if(!name) return;

  const target = store.players.find(x => x.name === name);
  if(target) { target.g = g; target.a = a; }
  else { store.players.push({ name, g, a }); }
  save(); render();
  document.getElementById('p-name').value = '';
  document.getElementById('p-g').value = 0;
  document.getElementById('p-a').value = 0;
}

function autoCalcHero() {
  store.hero.played = store.matches.length;
  store.hero.wins = store.matches.filter(m => m.result === 'W').length;
  store.hero.goals = store.players.reduce((sum, p) => sum + p.g, 0);
  save(); render();
}

function exportHTML() {
  store.hero.played = document.getElementById('hero-played').value;
  store.hero.wins = document.getElementById('hero-wins').value;
  store.hero.goals = document.getElementById('hero-goals').value;
  store.hero.rank = document.getElementById('hero-rank').value;
  save();

  let txtStandings = '';
  store.standings.sort((a,b)=>a.rank-b.rank).forEach(item => {
    const isHighlight = item.name.includes('SUNFIRES') ? ' class="rank-highlight"' : '';
    let badges = '';
    let chars = item.form.split('');
    for(let i=0; i<10; i++) {
      let c = chars[i] || '－';
      let bClass = c === 'W' ? 'form-W' : c === 'L' ? 'form-L' : c === 'D' ? 'form-D' : 'form-N';
      badges += `<span class="form-badge ${bClass}">${c}</span>`;
    }
    txtStandings += `<tr${isHighlight}><td>${item.rank}</td><td>${item.name}</td><td>${item.p}</td><td>${item.w}</td><td>${item.d}</td><td>${item.l}</td><td>${item.gf}</td><td>${item.ga}</td><td>${item.diff>0?'+'+item.diff:item.diff}</td><td>${badges}</td><td class="pts">${item.pts}</td></tr>\n`;
  });

  let txtResults = '';
  store.matches.forEach(item => {
    const cH = parseInt(item.shome) >= parseInt(item.saway) ? 'win' : 'lose';
    const cA = parseInt(item.saway) >= parseInt(item.shome) ? 'win' : 'lose';
    txtResults += `<div class="match-card"><div class="match-meta"><span>${item.date}</span><span class="match-round">${item.round}</span></div><div class="match-teams"><div class="team-name home">SUNFIRES</div><div class="score"><span class="${cH}">${item.shome}</span><span class="score-sep">:</span><span class="${cA}">${item.saway}</span></div><div class="team-name away">${item.opp}</div></div><div class="match-actions">${item.yt1?`<button class="btn-small btn-video" onclick="window.open('${item.yt1}')">▶ 前半動画</button>`:''}${item.yt2?`<button class="btn-small btn-video" onclick="window.open('${item.yt2}')">▶ 後半動画</button>`:''}</div></div>\n`;
  });

  let txtVideos = '';
  store.matches.forEach(item => {
    const y1 = getYTId(item.yt1);
    const y2 = getYTId(item.yt2);
    if(y1 || y2) {
      txtVideos += `<div class="highlight-card" style="grid-column:span 2; background:var(--navy-mid); border:1px solid var(--court-line); padding:1rem; border-radius:4px; margin-bottom:1rem;"><div style="font-weight:700; font-size:1.1rem; margin-bottom:0.5rem; color:var(--orange);">${item.round} vs ${item.opp} (${item.date})</div><div style="display:grid; grid-template-columns:${y1&&y2?'1fr 1fr':'1fr'}; gap:1rem;">${y1?`<div><div style="font-size:0.75rem; color:var(--gray); margin-bottom:0.25rem;">▶ 前半</div><div style="position:relative; aspect-ratio:16/9; background:#000;"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${y1}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe></div></div>`:''}${y2?`<div><div style="font-size:0.75rem; color:var(--gray); margin-bottom:0.25rem;">▶ 後半</div><div style="position:relative; aspect-ratio:16/9; background:#000;"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${y2}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe></div></div>`:''}</div></div>\n`;
    }
  });

  let txtGoals = '', txtAssists = '';
  [...store.players].filter(p=>p.g>0).sort((a,b)=>b.g-a.g).forEach((p,x)=>{
    txtGoals += `<tr class="${x===0?'top-player':''}"><td class="rank-col">${x+1}</td><td class="player-name">${p.name}</td><td class="player-stat">${p.g}</td></tr>\n`;
  });
  [...store.players].filter(p=>p.a>0).sort((a,b)=>b.a-a.a).forEach((p,x)=>{
    txtAssists += `<tr class="${x===0?'top-player':''}"><td class="rank-col">${x+1}</td><td class="player-name">${p.name}</td><td class="player-stat">${p.a}</td></tr>\n`;
  });

  // 画像がない場合のデフォルトは元のダミーURL
  const finalEmblemUrl = store.emblemData || "https://raw.githubusercontent.com/yokomakoto/sunfires/main/emblem.jpg";

  const out = `<!DOCTYPE html>
<html lang="ja">
